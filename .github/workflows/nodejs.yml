name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # The active LTS lines. The integration and build test suites have a
    # higher floor and run in the build-test job instead: their JPEG XL
    # fixtures need the Brotli support added in Node.js 24.7, and they
    # require() the ES module source which needs 22.12+.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22.x
          - os: ubuntu-latest
            node-version: 24.x
          - os: windows-latest
            node-version: 24.x
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run lint
    - run: npm run test
    - run: npm run test:types
    - run: npm run build
  build-test:
    # `npm run test:build` and `npm run test:integration` need Node.js 24.7+
    # because of the Brotli compression used in JPEG XL files.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - run: npm ci
    - run: npm run test:build
      env:
        CI: true
    - run: npm run test:integration
  package-ubuntu-full:
    # `npm run test:build:custom` needs Node.js 24.7+ because of the Brotli compression used in JPEG XL files.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js 24.x
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - run: npm ci
    - name: Test npm package and custom builds with minimal requirements
      run: |
        PATH=$(echo "$PATH" | sed -e 's/:\/usr\/local\/bin://'):/usr/local/bin/npm:/usr/local/bin/node
        npm run test:build:custom
  package-windows-basic:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
    - run: npm ci
    - name: Test npm package with minimal requirements
      run: |
        npm pack
        $PackageVersion = ((node -p "require('./package.json').version") | Out-String).Trim()
        mkdir ../my-project
        cd ../my-project
        $regexRemovePath = [regex]::Escape('C:\npm\prefix')
        $arrPath = $env:Path -split ';' | Where-Object {$_ -notMatch "^$regexRemovePath\\?"}
        $env:Path = $arrPath -join ';'
        node -p "const {writeFileSync} = require('fs'); const packageJson = {exifreader: {include: {jpeg: true, exif: true}}, dependencies: {exifreader: '../ExifReader/exifreader-$($PackageVersion).tgz'}}; writeFileSync('package.json', JSON.stringify(packageJson));"
        if ($LastExitCode -ne 0) { throw (Get-PSCallStack | Out-String) }
        npm install --production
        if ($LastExitCode -ne 0) { throw (Get-PSCallStack | Out-String) }
        npm rebuild exifreader
        if ($LastExitCode -ne 0) { throw (Get-PSCallStack | Out-String) }
      shell: pwsh -command "$ErrorActionPreference = 'Stop'; & {0}"
